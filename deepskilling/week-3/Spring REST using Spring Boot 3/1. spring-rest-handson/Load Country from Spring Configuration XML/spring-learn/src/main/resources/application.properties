# Application name
spring.application.name=spring-learn

# Server port (default is 8080, explicit here for clarity)
server.port=8080

# Logging level for your package - enables DEBUG logs from Country.java and SpringLearnApplication.java
logging.level.com.cognizant.spring_learn=DEBUG

# Optional: keep root/framework logs at INFO so console isn't flooded with Spring internals
logging.level.root=INFO